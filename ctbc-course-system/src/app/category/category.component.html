<div class="container py-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">類別管理</h2>
    <div *ngIf="isLoading" class="d-flex align-items-center gap-2">
      <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
      <span class="text-muted">處理中...</span>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
    {{ errorMessage }}
  </div>

  <div *ngIf="isLoggedIn" class="card mb-4">
    <div class="card-header">新增類別</div>
    <div class="card-body">
      <form #categoryForm="ngForm" (ngSubmit)="onAddCategory()">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label">名稱</label>
            <input
              class="form-control"
              name="newCategoryName"
              [(ngModel)]="newCategory.categoryName"
              required
              [disabled]="isLoading"
            />
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-primary w-100" type="submit" [disabled]="isLoading || categoryForm.invalid">
              新增
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-header">類別列表</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr>
              <th style="width: 80px">ID</th>
              <th>名稱</th>
              <th *ngIf="isLoggedIn" style="width: 240px">操作</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let c of categories; let i = index">
              <td>{{ c.id }}</td>
              <td>
                <ng-container *ngIf="c.isEditing; else viewName">
                  <input
                    class="form-control form-control-sm"
                    [name]="'name-' + (c.id ?? 'tmp')"
                    [(ngModel)]="c.categoryName"
                    [disabled]="isLoading"
                  />
                </ng-container>
                <ng-template #viewName>{{ c.categoryName }}</ng-template>
              </td>
              <td *ngIf="isLoggedIn">
                <div class="btn-group" role="group" aria-label="Category actions">
                  <button
                    *ngIf="!c.isEditing"
                    class="btn btn-outline-secondary btn-sm"
                    type="button"
                    (click)="onToggleModify(c)"
                    [disabled]="isLoading"
                  >
                    編輯
                  </button>

                  <button
                    *ngIf="c.isEditing"
                    class="btn btn-success btn-sm"
                    type="button"
                    (click)="onUpdateCategory(c)"
                    [disabled]="isLoading"
                  >
                    儲存
                  </button>

                  <button
                    *ngIf="c.isEditing"
                    class="btn btn-outline-secondary btn-sm"
                    type="button"
                    (click)="onCancelModify(c)"
                    [disabled]="isLoading"
                  >
                    取消
                  </button>

                  <button
                    class="btn btn-outline-danger btn-sm"
                    type="button"
                    (click)="onDeleteCategory(c.id)"
                    [disabled]="isLoading"
                  >
                    刪除
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="!isLoading && categories.length === 0">
              <td [attr.colspan]="isLoggedIn ? 3 : 2" class="text-center text-muted py-4">目前沒有資料</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
