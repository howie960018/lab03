

<div class="container py-4">
  <h2 class="mb-4">類別管理</h2>

  <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
    {{ errorMessage }}
  </div>

  <div class="card mb-4">
    <div class="card-header">新增類別</div>
    <div class="card-body">
      <form #catForm="ngForm" (ngSubmit)="onAddCategory()">
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label">類別名稱 <span class="text-danger">*</span></label>
            <input class="form-control" [(ngModel)]="newCategory.categoryName" name="newName" required>
          </div>
          <div class="col-md-2">
            <button class="btn btn-primary w-100" type="submit" [disabled]="catForm.invalid || isLoading">
              新增
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-header">類別列表</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped mb-0 align-middle">
          <thead>
            <tr>
              <th style="width: 80px">ID</th>
              <th>名稱</th>
              <th style="width: 180px">操作</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let c of categories">
              <td>{{ c.id }}</td>
              <td>
                <ng-container *ngIf="c.isEditing; else viewMode">
                  <input class="form-control form-control-sm" [(ngModel)]="c.categoryName" [name]="'cat-' + c.id">
                </ng-container>
                <ng-template #viewMode>{{ c.categoryName }}</ng-template>
              </td>
              <td>
                <div class="btn-group btn-group-sm">
                  <button *ngIf="!c.isEditing" class="btn btn-outline-secondary" (click)="onToggleModify(c)">
                    編輯
                  </button>
                  <button *ngIf="c.isEditing" class="btn btn-success" (click)="onUpdateCategory(c)">
                    儲存
                  </button>
                  <button *ngIf="c.isEditing" class="btn btn-outline-secondary" (click)="onCancelModify(c)">
                    取消
                  </button>
                  <button class="btn btn-outline-danger" (click)="onDeleteCategory(c.id)">
                    刪除
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="!isLoading && categories.length === 0">
              <td colspan="3" class="text-center text-muted py-4">
                目前沒有資料
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
