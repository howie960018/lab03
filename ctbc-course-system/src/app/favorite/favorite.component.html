

<div class="container py-4">

  <h2 class="mb-4">❤️ 我的收藏</h2>

  <div *ngIf="isLoading" class="text-center my-4">
    <div class="spinner-border"></div>
  </div>

  <div class="row g-4">

    <div class="col-md-4" *ngFor="let c of courses">

      <div class="card h-100 shadow-sm">

        <img [src]="c.imageUrl" class="card-img-top" style="height:180px;object-fit:cover">

        <div class="card-body d-flex flex-column">

          <h5>{{ c.courseName }}</h5>

          <p class="text-muted">
            {{ c.courseSummary || '尚無描述' }}
          </p>

          <div class="mt-auto">

            <div class="fw-bold mb-2">
              NT$ {{ c.price || 0 }}
            </div>

            <button class="btn btn-danger w-100" (click)="onRemove(c.id)">
              ❌ 取消收藏
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

  <div *ngIf="!isLoading && courses.length === 0" class="text-center text-muted mt-4">
    尚未收藏任何課程
  </div>

</div>
