<section class="hero bg-primary text-white py-5 mb-5">
  <div class="container text-center">
    <h1 class="display-5 fw-bold">精選線上課程</h1>
    <p class="lead">探索各種技能，提升自我競爭力</p>
    <a routerLink="/courses" class="btn btn-light btn-lg mt-3">瀏覽所有課程</a>
  </div>
</section>

<div class="container">
  <h2 class="mb-4">最新課程</h2>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border" role="status"></div>
  </div>

  <div *ngIf="!isLoading" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    <div class="col" *ngFor="let course of featuredCourses">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <span class="badge bg-secondary mb-2" *ngIf="course.level">{{course.level}}</span>
          <h5 class="card-title">{{course.courseName}}</h5>
          <p class="card-text text-muted small">{{course.courseSummary}}</p>
          <p class="card-text small" *ngIf="course.instructorName">
            <i class="bi bi-person"></i> {{course.instructorName}}
          </p>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
          <span class="fw-bold text-primary">NT$ {{course.price | number}}</span>
          <a [routerLink]="['/courses', course.id]" class="btn btn-outline-primary btn-sm">了解更多</a>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoading && featuredCourses.length === 0" class="text-center py-5 text-muted">
    目前尚無課程
  </div>

  <div class="text-center mt-4">
    <a routerLink="/courses" class="btn btn-primary">查看全部課程</a>
  </div>
</div>
