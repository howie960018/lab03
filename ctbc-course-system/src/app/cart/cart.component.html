<div class="container py-4">
  <h2 class="mb-4">購物車</h2>

  <div *ngIf="errorMessage" class="alert alert-danger">{{errorMessage}}</div>

  <ng-container *ngIf="items.length > 0; else emptyCart">
    <div class="row">
      <div class="col-lg-8">
        <div class="card mb-3" *ngFor="let item of items">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <h6 class="mb-0">{{item.courseName}}</h6>
              <span class="text-primary fw-bold">NT$ {{item.price | number}}</span>
            </div>
            <button class="btn btn-outline-danger btn-sm" (click)="onRemove(item.courseId)">移除</button>
          </div>
        </div>
        <button class="btn btn-outline-secondary btn-sm" (click)="onClear()">清空購物車</button>
      </div>

      <div class="col-lg-4">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">訂單摘要</h5>
            <div class="d-flex justify-content-between mb-2">
              <span>共 {{items.length}} 個課程</span>
            </div>
            <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
              <span>總計</span>
              <span class="text-primary">NT$ {{cartService.total | number}}</span>
            </div>
            <button class="btn btn-primary w-100" [disabled]="isLoading" (click)="onCheckout()">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1"></span>
              {{isLoading ? '處理中...' : '結帳'}}
            </button>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-template #emptyCart>
    <div class="text-center py-5">
      <p class="text-muted fs-5">購物車是空的</p>
      <a routerLink="/courses" class="btn btn-primary">瀏覽課程</a>
    </div>
  </ng-template>
</div>
