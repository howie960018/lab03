<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/home">CTBC 課程平台</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/home" routerLinkActive="active">首頁</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/courses" routerLinkActive="active">課程</a>
        </li>

        <ng-container *ngIf="authService.isAdmin()">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">管理員</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" routerLink="/admin/dashboard">儀表板</a></li>
              <li><a class="dropdown-item" routerLink="/admin/courses">課程管理</a></li>
              <li><a class="dropdown-item" routerLink="/admin/categories">類別管理</a></li>
              <li><a class="dropdown-item" routerLink="/admin/chapters">章節管理</a></li>
              <li><a class="dropdown-item" routerLink="/admin/reviews">評論管理</a></li>
            </ul>
          </li>
        </ng-container>

        <ng-container *ngIf="authService.isInstructor() && !authService.isAdmin()">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">講師</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" routerLink="/instructor/dashboard">儀表板</a></li>
              <li><a class="dropdown-item" routerLink="/instructor/courses">我的課程</a></li>
            </ul>
          </li>
        </ng-container>
      </ul>

      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
        <ng-container *ngIf="authService.isLoggedIn(); else notLoggedIn">
          <li class="nav-item">
            <a class="nav-link position-relative" routerLink="/cart" routerLinkActive="active">
              購物車
              <span *ngIf="cartCount > 0"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                {{cartCount}}
              </span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/my-courses" routerLinkActive="active">我的課程</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/orders" routerLinkActive="active">訂單</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/profile" routerLinkActive="active">個人資料</a>
          </li>
          <li class="nav-item">
            <button class="btn btn-outline-light btn-sm ms-2" (click)="onLogout()">登出</button>
          </li>
        </ng-container>
        <ng-template #notLoggedIn>
          <li class="nav-item">
            <a class="nav-link" routerLink="/cart" routerLinkActive="active">
              購物車
              <span *ngIf="cartCount > 0"
                class="badge bg-danger ms-1">{{cartCount}}</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">登入</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/register" routerLinkActive="active">註冊</a>
          </li>
        </ng-template>
      </ul>
    </div>
  </div>
</nav>
