<div class="container py-4" *ngIf="!isLoading && order">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a routerLink="/orders">我的訂單</a></li>
      <li class="breadcrumb-item active">訂單 #{{order.id}}</li>
    </ol>
  </nav>

  <div *ngIf="successMessage" class="alert alert-success">{{successMessage}}</div>
  <div *ngIf="errorMessage" class="alert alert-danger">{{errorMessage}}</div>

  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="mb-0">訂單 #{{order.id}}</h5>
      <span class="badge" [ngClass]="statusClass(order.status)">{{statusLabel(order.status)}}</span>
    </div>
    <div class="card-body">
      <p class="text-muted small">建立時間：{{order.createdAt | date:'yyyy-MM-dd HH:mm'}}</p>

      <h6>購買課程</h6>
      <table class="table">
        <thead>
          <tr>
            <th>課程名稱</th>
            <th class="text-end">價格</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of order.items">
            <td>{{item.courseName}}</td>
            <td class="text-end">NT$ {{item.price | number}}</td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <th>總計</th>
            <th class="text-end text-primary">NT$ {{order.totalAmount | number}}</th>
          </tr>
        </tfoot>
      </table>

      <div *ngIf="order.status === 'PENDING'" class="d-flex gap-2 mt-3">
        <button class="btn btn-success" (click)="onPay()">確認付款</button>
        <button class="btn btn-outline-danger" (click)="onCancel()">取消訂單</button>
      </div>

      <div *ngIf="order.status === 'PAID'" class="mt-3">
        <a routerLink="/my-courses" class="btn btn-primary">前往我的課程</a>
      </div>
    </div>
  </div>
</div>

<div *ngIf="isLoading" class="text-center py-5">
  <div class="spinner-border" role="status"></div>
</div>

<div *ngIf="errorMessage && !order" class="container py-4">
  <div class="alert alert-danger">{{errorMessage}}</div>
</div>
