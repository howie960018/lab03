<div class="container py-4">
  <h2 class="mb-4">我的訂單</h2>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border" role="status"></div>
  </div>

  <ng-container *ngIf="!isLoading">
    <div *ngIf="orders.length === 0" class="text-center py-5 text-muted">
      尚無訂單
    </div>

    <div class="card mb-3" *ngFor="let order of orders">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <div>
            <span class="fw-bold">訂單 #{{order.id}}</span>
            <span class="ms-2 badge" [ngClass]="statusClass(order.status)">{{statusLabel(order.status)}}</span>
          </div>
          <span class="text-primary fw-bold">NT$ {{order.totalAmount | number}}</span>
        </div>
        <p class="text-muted small mb-2">{{order.createdAt | date:'yyyy-MM-dd HH:mm'}}</p>
        <ul class="list-unstyled mb-2">
          <li *ngFor="let item of order.items" class="text-muted small">
            • {{item.courseName}} — NT$ {{item.price | number}}
          </li>
        </ul>
        <a [routerLink]="['/orders', order.id]" class="btn btn-outline-primary btn-sm">查看詳情</a>
      </div>
    </div>
  </ng-container>
</div>
