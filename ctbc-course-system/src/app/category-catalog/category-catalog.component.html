<div class="container py-4">
  <h2 class="mb-4">探索類別</h2>

  <div class="row g-3">
    <div class="col-12 col-md-6 col-lg-4" *ngFor="let c of categories">
      <!-- 類別卡片，點擊後觸發跳轉 -->
      <div class="category-card" (click)="goToCategory(c)">
        <div class="icon">
          <!-- 取類別名稱的第一個字作為圖示內容 -->
          {{ c.categoryName.charAt(0) }}
        </div>
        <div class="name">
          {{ c.categoryName }}
        </div>
      </div>
    </div>
  </div>
</div>
