<div class="container py-4">
  <h2 class="mb-4">所有課程</h2>

  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="input-group">
        <input type="text" class="form-control" placeholder="搜尋課程..." [(ngModel)]="keyword" (keyup.enter)="onSearch()">
        <button class="btn btn-primary" (click)="onSearch()">搜尋</button>
      </div>
    </div>
    <div class="col-md-4">
      <select class="form-select" [(ngModel)]="selectedCategoryId" (change)="onCategoryChange()">
        <option [ngValue]="undefined">所有類別</option>
        <option *ngFor="let cat of categories" [ngValue]="cat.id">{{cat.categoryName}}</option>
      </select>
    </div>
  </div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border" role="status"></div>
  </div>

  <ng-container *ngIf="!isLoading">
    <p class="text-muted">共 {{totalElements}} 個課程</p>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      <div class="col" *ngFor="let course of courses">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <span class="badge bg-secondary mb-2" *ngIf="course.level">{{course.level}}</span>
            <h5 class="card-title">{{course.courseName}}</h5>
            <p class="card-text text-muted small">{{course.courseSummary}}</p>
            <p class="card-text small text-secondary" *ngIf="course.instructorName">
              講師：{{course.instructorName}}
            </p>
            <p class="card-text small text-secondary" *ngIf="course.durationHours">
              時數：{{course.durationHours}} 小時
            </p>
          </div>
          <div class="card-footer d-flex justify-content-between align-items-center">
            <span class="fw-bold text-primary fs-5">NT$ {{course.price | number}}</span>
            <a [routerLink]="['/courses', course.id]" class="btn btn-outline-primary btn-sm">查看詳情</a>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="courses.length === 0" class="text-center py-5 text-muted">
      沒有符合條件的課程
    </div>

    <nav class="mt-4" *ngIf="totalPages > 1">
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="currentPage === 0">
          <button class="page-link" (click)="goToPage(currentPage - 1)">上一頁</button>
        </li>
        <li class="page-item" *ngFor="let p of pages" [class.active]="p === currentPage">
          <button class="page-link" (click)="goToPage(p)">{{p + 1}}</button>
        </li>
        <li class="page-item" [class.disabled]="currentPage === totalPages - 1">
          <button class="page-link" (click)="goToPage(currentPage + 1)">下一頁</button>
        </li>
      </ul>
    </nav>
  </ng-container>
</div>
