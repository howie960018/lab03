<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Dashboard</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container py-4">
    <h2 class="mb-4">Admin dashboard</h2>

    <div class="row g-3">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Total courses</h5>
                    <p class="display-6 mb-0" th:text="${courseCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Total categories</h5>
                    <p class="display-6 mb-0" th:text="${categoryCount}">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4 d-flex flex-wrap gap-2">
        <a class="btn btn-primary" th:href="@{/admin/courses}">Manage courses</a>
        <a class="btn btn-outline-primary" th:href="@{/admin/course/form}">Add course</a>
        <a class="btn btn-secondary" th:href="@{/admin/categories}">Manage categories</a>
        <a class="btn btn-outline-secondary" th:href="@{/admin/category/form}">Add category</a>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
