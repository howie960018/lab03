<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Categories</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Categories</h2>
        <a th:href="@{/admin/category/form}" class="btn btn-primary">New category</a>
    </div>

    <table class="table table-bordered align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Parent</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${categories}">
                <td th:text="${cat.id}"></td>
                <td th:text="${cat.categoryName}"></td>
                <td th:text="${cat.parent != null ? cat.parent.categoryName : 'Top level'}"></td>
                <td>
                    <a th:href="@{/admin/category/edit/{id}(id=${cat.id})}"
                       class="btn btn-sm btn-warning">Edit</a>
                    <form th:action="@{/admin/category/delete/{id}(id=${cat.id})}"
                          method="post" class="d-inline"
                          onsubmit="return confirm('Delete this category?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
