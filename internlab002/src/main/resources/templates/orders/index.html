<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">My Orders</h2>
    </div>

    <div class="text-muted" th:if="${orders == null || orders.size() == 0}">
        You have no orders yet.
    </div>

    <div class="table-responsive" th:if="${orders != null && orders.size() > 0}">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>Order ID</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="'$' + ${order.totalAmount}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${order.status == T(com.ctbc.assignment2.bean.OrderStatus).PENDING} ? ' bg-warning text-dark' :
                                           (${order.status == T(com.ctbc.assignment2.bean.OrderStatus).PAID} ? ' bg-success' : ' bg-secondary')"
                          th:text="${order.status}">PENDING</span>
                </td>
                <td th:text="${order.createdAt}"></td>
                <td>
                    <a class="btn btn-sm btn-outline-primary"
                       th:href="@{/orders/{id}(id=${order.id})}">View</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
