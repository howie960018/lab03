<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Detail</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container py-4" style="max-width: 960px;">
    <a class="btn btn-link px-0" th:href="@{/orders}">Back to orders</a>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1">Order #<span th:text="${order.id}"></span></h2>
            <div class="text-muted" th:text="${order.createdAt}"></div>
        </div>
        <span class="badge"
              th:classappend="${order.status == T(com.ctbc.assignment2.bean.OrderStatus).PENDING} ? ' bg-warning text-dark' :
                               (${order.status == T(com.ctbc.assignment2.bean.OrderStatus).PAID} ? ' bg-success' : ' bg-secondary')"
              th:text="${order.status}">PENDING</span>
    </div>

    <div class="table-responsive mb-4">
        <table class="table table-bordered align-middle">
            <thead>
            <tr>
                <th>Course</th>
                <th class="text-end">Price</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${order.items}">
                <td th:text="${item.course.courseName}">Course</td>
                <td class="text-end" th:text="'$' + ${item.price}">$0</td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <th>Total</th>
                <th class="text-end" th:text="'$' + ${order.totalAmount}">$0</th>
            </tr>
            </tfoot>
        </table>
    </div>

    <div th:if="${order.status == T(com.ctbc.assignment2.bean.OrderStatus).PENDING}" class="d-flex gap-2">
        <form th:action="@{/orders/{id}/pay(id=${order.id})}" method="post">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-success">Pay Now</button>
        </form>
        <form th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-outline-danger">Cancel Order</button>
        </form>
    </div>

    <div class="alert alert-success" th:if="${order.status == T(com.ctbc.assignment2.bean.OrderStatus).PAID}">
        Paid. <a th:href="@{/my-courses}">Go to my courses</a>
    </div>

    <div class="alert alert-secondary" th:if="${order.status == T(com.ctbc.assignment2.bean.OrderStatus).CANCELLED}">
        This order was cancelled.
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
