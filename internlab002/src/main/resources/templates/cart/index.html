<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shopping Cart</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container py-4" style="max-width: 960px;">
    <h2 class="mb-4">Shopping cart</h2>

    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead>
                <tr>
                    <th>Course</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.courseName}"></td>
                    <td th:text="${item.price}"></td>
                    <td>
                        <form th:action="@{/cart/remove/{id}(id=${item.courseId})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Remove</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex justify-content-between align-items-center">
        <div class="fw-semibold" th:text="'Total: $' + ${total}">Total: $0</div>
        <div class="d-flex gap-2">
            <form th:action="@{/cart/clear}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-secondary">Clear</button>
            </form>
            <form th:action="@{/cart/checkout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary">Checkout</button>
            </form>
            <a class="btn btn-outline-primary" th:href="@{/courses}">Continue shopping</a>
        </div>
    </div>

    <div class="text-muted mt-3" th:if="${items == null || items.size() == 0}">Your cart is empty.</div>
</main>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
