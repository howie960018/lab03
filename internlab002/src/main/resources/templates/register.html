<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container py-4" style="max-width: 520px;">
    <h2 class="mb-3">Create account</h2>

    <form th:action="@{/register}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
            <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" th:field="*{username}"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                   class="form-control">
            <div class="invalid-feedback" th:errors="*{username}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                   class="form-control">
            <div class="invalid-feedback" th:errors="*{password}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm password</label>
            <input type="password" th:field="*{confirmPassword}"
                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                   class="form-control">
            <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Register</button>
        <div class="text-center mt-3">
            <a th:href="@{/login}">Already have an account? Login</a>
        </div>
    </form>
</main>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
