<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container py-4" style="max-width: 720px;">
    <h2 class="mb-4">My profile</h2>

    <div th:if="${param.success}" class="alert alert-success">Password updated successfully.</div>
    <div th:if="${param.error}" class="alert alert-danger">
        <span th:if="${param.error[0] == 'current'}">Current password is incorrect.</span>
        <span th:if="${param.error[0] != 'current'}">Password validation failed.</span>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <div class="mb-2"><strong>Username:</strong> <span th:text="${username}"></span></div>
            <div class="mb-2">
                <strong>Role:</strong>
                <span class="badge"
                      th:classappend="${role == 'ADMIN'} ? ' bg-danger' : (${role == 'INSTRUCTOR'} ? ' bg-warning text-dark' : ' bg-success')"
                      th:text="${role}">USER</span>
            </div>
            <div><strong>Enrollments:</strong> <span th:text="${enrollmentCount}">0</span></div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Change password</h5>
            <form th:action="@{/profile/change-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label class="form-label">Current password</label>
                    <input type="password" name="currentPassword" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">New password</label>
                    <input type="password" name="newPassword" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm new password</label>
                    <input type="password" name="confirmPassword" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary">Update password</button>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
