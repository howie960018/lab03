<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Layout</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">CourseHub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/courses}">Courses</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('INSTRUCTOR')">
                    <a class="nav-link" th:href="@{/instructor/dashboard}">Instructor</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">Admin Panel</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/profile}">My Profile</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('USER')">
                    <a class="nav-link" th:href="@{/my-courses}">My Courses</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('USER')">
                    <a class="nav-link" th:href="@{/cart}">
                        Cart
                        <span class="badge bg-danger ms-1"
                              th:text="${session.CART != null ? session.CART.size() : 0}">0</span>
                    </a>
                </li>
            </ul>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-primary" sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
                <a class="btn btn-primary" sec:authorize="isAnonymous()" th:href="@{/register}">Register</a>
                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-danger">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="border-top mt-5 py-4 bg-light">
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
        <span class="text-muted">CourseHub - Learn with confidence</span>
        <span class="text-muted">© 2026</span>
    </div>
</footer>
</body>
</html>
