<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CourseHub</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container py-4">
    <div class="p-4 p-md-5 mb-4 bg-light rounded-3">
        <div class="row align-items-center">
            <div class="col-lg-7">
                <h1 class="display-6 fw-bold">Discover your next course</h1>
                <p class="lead text-muted">Browse curated classes, explore categories, and start learning today.</p>
                <a class="btn btn-primary" th:href="@{/courses}">Browse courses</a>
            </div>
        </div>
    </div>

    <section class="mb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">Featured courses</h3>
            <a th:href="@{/courses}" class="text-decoration-none">View all</a>
        </div>
        <div class="row g-3">
            <div class="col-md-6 col-lg-4" th:each="course : ${featuredCourses}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${course.courseName}">Course name</h5>
                        <p class="text-muted small mb-2"
                           th:text="${course.category != null ? course.category.categoryName : 'Uncategorized'}"></p>
                        <div class="fw-semibold" th:text="'$' + ${course.price}">$0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="text-muted mt-3" th:if="${featuredCourses == null || featuredCourses.size() == 0}">
            No courses available yet.
        </div>
    </section>

    <section>
        <h4 class="mb-3">Browse by category</h4>
        <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-outline-secondary btn-sm" th:each="cat : ${categories}"
               th:href="@{/courses(id=${cat.id})}" th:text="${cat.categoryName}"></a>
        </div>
    </section>
</main>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
