<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>錯誤</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="container py-4" style="max-width: 680px;">

    <div class="alert alert-danger">
        <h5 class="alert-heading fw-bold"
            th:text="${errorTitle} ?: '系統錯誤'">系統錯誤</h5>
        <hr>


        <p th:text="${errorMessage}">錯誤訊息</p>

        <ul th:if="${fieldErrors != null and !#lists.isEmpty(fieldErrors)}" class="mb-0">
            <li th:each="err : ${fieldErrors}" th:text="${err}"></li>
        </ul>
    </div>


    <button type="button" class="btn btn-primary" onclick="history.back()">回到上一頁</button>
</main>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
