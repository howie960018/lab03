# H2 記憶體資料庫
spring.datasource.url=jdbc:h2:mem:lab02
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA 自動建立/更新表格
spring.jpa.hibernate.ddl-auto=update

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 印出 SQL
spring.jpa.show-sql=false

# Reduce noisy HandlerMappingIntrospector warnings
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR

# Session timeout (30 minutes)
server.servlet.session.timeout=30m

# JWT
security.jwt.secret=changeit-changeit-changeit-changeit
security.jwt.expiration-ms=1800000

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
app.upload.dir=uploads/course-covers
